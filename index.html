<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>近くの図書館を探す</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        .panel {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .search-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .prefecture-selector {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .library-list {
            flex: 1;
            overflow-y: auto;
        }

        .library-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .library-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .library-item.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff 0%, #f5f7ff 100%);
            font-weight: 600;
        }

        .library-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .library-info {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .library-info span {
            display: block;
            margin-bottom: 4px;
        }

        .map-container {
            border-radius: 12px;
            overflow: hidden;
            background: #e0e0e0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }

        .success {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
        }

        .info {
            background: #eef;
            border: 1px solid #ccf;
            color: #33c;
        }

        .stats {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #eee;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 0;
            padding: 10px 16px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-radius: 0;
        }

        .tab-btn:hover {
            color: #667eea;
            box-shadow: none;
            transform: none;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h1>📍 近くの図書館を探す</h1>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('gps')">📍 現在地検索</button>
                <button class="tab-btn" onclick="switchTab('prefecture')">🗺️ 都道府県検索</button>
            </div>

            <div id="statusMessage"></div>

            <!-- GPS検索タブ -->
            <div id="gps-tab" class="tab-content active">
                <div class="search-section">
                    <button id="gpsBtn" onclick="searchByGPS()">現在地から検索</button>
                    <div style="font-size: 12px; color: #999; text-align: center;">
                        ※ ブラウザの位置情報許可が必要です
                    </div>
                </div>
            </div>

            <!-- 都道府県検索タブ -->
            <div id="prefecture-tab" class="tab-content">
                <div class="search-section">
                    <div class="prefecture-selector">
                        <select id="prefectureSelect">
                            <option value="">都道府県を選択してください</option>
                            <option value="北海道">北海道</option>
                            <option value="青森県">青森県</option>
                            <option value="岩手県">岩手県</option>
                            <option value="宮城県">宮城県</option>
                            <option value="秋田県">秋田県</option>
                            <option value="山形県">山形県</option>
                            <option value="福島県">福島県</option>
                            <option value="茨城県">茨城県</option>
                            <option value="栃木県">栃木県</option>
                            <option value="群馬県">群馬県</option>
                            <option value="埼玉県">埼玉県</option>
                            <option value="千葉県">千葉県</option>
                            <option value="東京都">東京都</option>
                            <option value="神奈川県">神奈川県</option>
                            <option value="新潟県">新潟県</option>
                            <option value="富山県">富山県</option>
                            <option value="石川県">石川県</option>
                            <option value="福井県">福井県</option>
                            <option value="山梨県">山梨県</option>
                            <option value="長野県">長野県</option>
                            <option value="岐阜県">岐阜県</option>
                            <option value="静岡県">静岡県</option>
                            <option value="愛知県">愛知県</option>
                            <option value="三重県">三重県</option>
                            <option value="滋賀県">滋賀県</option>
                            <option value="京都府">京都府</option>
                            <option value="大阪府">大阪府</option>
                            <option value="兵庫県">兵庫県</option>
                            <option value="奈良県">奈良県</option>
                            <option value="和歌山県">和歌山県</option>
                            <option value="鳥取県">鳥取県</option>
                            <option value="島根県">島根県</option>
                            <option value="岡山県">岡山県</option>
                            <option value="広島県">広島県</option>
                            <option value="山口県">山口県</option>
                            <option value="徳島県">徳島県</option>
                            <option value="香川県">香川県</option>
                            <option value="愛媛県">愛媛県</option>
                            <option value="高知県">高知県</option>
                            <option value="福岡県">福岡県</option>
                            <option value="佐賀県">佐賀県</option>
                            <option value="長崎県">長崎県</option>
                            <option value="熊本県">熊本県</option>
                            <option value="大分県">大分県</option>
                            <option value="宮崎県">宮崎県</option>
                            <option value="鹿児島県">鹿児島県</option>
                            <option value="沖縄県">沖縄県</option>
                        </select>
                        <button id="prefSearchBtn" onclick="searchByPrefecture()" style="flex: 0;">検索</button>
                    </div>
                </div>
            </div>

            <div class="library-list" id="libraryList"></div>
        </div>

        <div class="panel map-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY = 'f9c0807391079d2d68e9b10e9055642f';
        let map;
        let markers = [];
        let libraries = [];
        let selectedLibrary = null;
        let currentMapCenter = [35.6762, 139.6503];

        // 都道府県の中心座標
        const prefectureCenters = {
            '北海道': [43.064, 141.346], '青森県': [40.824, 140.741], '岩手県': [39.704, 141.156],
            '宮城県': [38.269, 140.869], '秋田県': [39.719, 140.103], '山形県': [38.241, 140.364],
            '福島県': [37.750, 140.468], '茨城県': [36.418, 140.447], '栃木県': [36.632, 140.144],
            '群馬県': [36.731, 139.116], '埼玉県': [35.896, 139.069], '千葉県': [35.605, 140.124],
            '東京都': [35.6762, 139.6503], '神奈川県': [35.447, 139.545], '新潟県': [37.912, 139.036],
            '富山県': [36.695, 137.211], '石川県': [36.594, 136.626], '福井県': [36.067, 136.222],
            '山梨県': [35.664, 138.568], '長野県': [36.651, 138.201], '岐阜県': [35.391, 136.723],
            '静岡県': [34.978, 138.387], '愛知県': [35.181, 136.906], '三重県': [34.506, 136.362],
            '滋賀県': [35.008, 135.868], '京都府': [35.021, 135.755], '大阪府': [34.694, 135.502],
            '兵庫県': [34.691, 135.183], '奈良県': [34.345, 135.833], '和歌山県': [33.740, 135.598],
            '鳥取県': [35.503, 134.238], '島根県': [35.472, 132.556], '岡山県': [34.662, 133.934],
            '広島県': [34.399, 132.428], '山口県': [34.186, 131.471], '徳島県': [34.066, 134.559],
            '香川県': [34.340, 134.043], '愛媛県': [33.841, 132.766], '高知県': [33.561, 133.531],
            '福岡県': [33.647, 130.702], '佐賀県': [33.249, 130.299], '長崎県': [32.690, 129.873],
            '熊本県': [32.790, 130.741], '大分県': [33.238, 131.613], '宮崎県': [31.911, 131.424],
            '鹿児島県': [31.560, 130.558], '沖縄県': [26.212, 127.681]
        };

        // Tab switching
        function switchTab(tab) {
            ['gps', 'prefecture'].forEach(t => {
                const tabEl = document.getElementById(t + '-tab');
                const btnEl = document.querySelector(`button[onclick="switchTab('${t}')"]`);
                if (tabEl) tabEl.classList.remove('active');
                if (btnEl) btnEl.classList.remove('active');
            });
            const activeTab = document.getElementById(tab + '-tab');
            const activeBtn = document.querySelector(`button[onclick="switchTab('${tab}')"]`);
            if (activeTab) activeTab.classList.add('active');
            if (activeBtn) activeBtn.classList.add('active');
        }

        // Initialize map
        function initMap() {
            map = L.map('map').setView(currentMapCenter, 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
        }

        // Show status message
        function showStatus(message, type = 'info') {
            const el = document.getElementById('statusMessage');
            if (!message) {
                el.innerHTML = '';
                return;
            }
            const icons = { error: '❌', success: '✓', info: 'ℹ️', loading: '<span class="spinner"></span>' };
            el.innerHTML = `<div class="message ${type}">${icons[type] || message} ${message}</div>`;
        }

        // JSONP リクエスト
        function jsonpRequest(url) {
            return new Promise((resolve, reject) => {
                const callback = `jsonpCallback_${Date.now()}`;
                window[callback] = (data) => {
                    delete window[callback];
                    document.body.removeChild(script);
                    resolve(data);
                };

                const script = document.createElement('script');
                script.src = url + (url.includes('?') ? '&' : '?') + `callback=${callback}`;
                script.onerror = () => reject(new Error('API request failed'));
                document.body.appendChild(script);
            });
        }

        // Search by GPS
        async function searchByGPS() {
            const btn = document.getElementById('gpsBtn');
            btn.disabled = true;

            try {
                showStatus('現在地を取得中...', 'loading');

                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });

                const { latitude, longitude } = position.coords;
                await searchNearbyLibraries(latitude, longitude, '現在地から検索');

            } catch (error) {
                let errorMsg = '位置情報の取得に失敗しました。';
                if (error.code === 1) errorMsg += '位置情報へのアクセスが拒否されました。';
                else if (error.code === 2) errorMsg += '位置情報が取得できません。';
                else if (error.code === 3) errorMsg += '位置情報の取得がタイムアウトしました。';
                errorMsg += '都道府県検索をお試しください。';
                showStatus(errorMsg, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // Search by prefecture
        async function searchByPrefecture() {
            const select = document.getElementById('prefectureSelect');
            const pref = select.value;

            if (!pref) {
                showStatus('都道府県を選択してください', 'error');
                return;
            }

            const btn = document.getElementById('prefSearchBtn');
            btn.disabled = true;

            try {
                const coords = prefectureCenters[pref];
                await searchNearbyLibraries(coords[0], coords[1], pref + 'から検索', pref);
            } catch (error) {
                showStatus(`エラー: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // Search nearby libraries
        async function searchNearbyLibraries(latitude, longitude, label, prefName = null) {
            try {
                showStatus('図書館情報を取得中...', 'loading');

                let url;
                if (prefName) {
                    // 都道府県検索の場合は pref パラメータを使用
                    url = `https://api.calil.jp/library?` +
                        `appkey=${API_KEY}&` +
                        `pref=${prefName}&` +
                        `limit=100&` +
                        `format=jsonp`;
                } else {
                    // GPS検索の場合は geocode パラメータを使用
                    url = `https://api.calil.jp/library?` +
                        `appkey=${API_KEY}&` +
                        `geocode=${longitude},${latitude}&` +
                        `limit=100&` +
                        `format=jsonp`;
                }

                const data = await jsonpRequest(url);
                libraries = data.libraries || [];

                if (libraries.length === 0) {
                    showStatus('この地域の図書館が見つかりませんでした', 'error');
                    return;
                }

                // Clear previous markers
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];

                // Update map
                currentMapCenter = [latitude, longitude];
                map.setView([latitude, longitude], 13);

                // Add user location marker
                L.circleMarker([latitude, longitude], {
                    radius: 8,
                    fillColor: '#667eea',
                    color: '#fff',
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup(label);

                // Add library markers
                libraries.forEach((lib, idx) => {
                    const marker = L.marker([lib.latitude, lib.longitude], {
                        title: lib.formal_name
                    }).addTo(map);

                    marker.on('click', () => selectLibrary(idx));
                    markers.push(marker);
                });

                displayLibraries();
                showStatus(`✓ ${libraries.length}件の図書館を見つけました`, 'success');

            } catch (error) {
                showStatus(`エラー: ${error.message}`, 'error');
            }
        }

        // Display library list
        function displayLibraries() {
            const listEl = document.getElementById('libraryList');
            listEl.innerHTML = libraries.map((lib, idx) => `
                <div class="library-item ${selectedLibrary === idx ? 'active' : ''}"
                     onclick="selectLibrary(${idx})">
                    <div class="library-name">${lib.formal_name}</div>
                    <div class="library-info">
                        ${lib.address ? `<span>📍 ${lib.address}</span>` : ''}
                        ${lib.tel ? `<span>☎️ ${lib.tel}</span>` : ''}
                        ${lib.systemname ? `<span>🏛️ ${lib.systemname}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Select library
        function selectLibrary(idx) {
            selectedLibrary = idx;
            const lib = libraries[idx];

            displayLibraries();
            map.setView([lib.latitude, lib.longitude], 15);
            markers[idx].openPopup();
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initMap();
            showStatus('検索方法を選択してください', 'info');
        });
    </script>
</body>
</html>
