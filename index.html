<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>近くの図書館を探す</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        .panel {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .library-list {
            flex: 1;
            overflow-y: auto;
        }

        .library-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .library-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .library-item.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff 0%, #f5f7ff 100%);
            font-weight: 600;
        }

        .library-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .library-info {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .library-info span {
            display: block;
            margin-bottom: 4px;
        }

        .map-container {
            border-radius: 12px;
            overflow: hidden;
            background: #e0e0e0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .stats {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h1>📍 近くの図書館を探す</h1>

            <div class="search-section">
                <button id="searchBtn" onclick="searchLibraries()">現在地から検索</button>
            </div>

            <div id="statusMessage"></div>
            <div class="library-list" id="libraryList"></div>
        </div>

        <div class="panel map-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY = 'f9c0807391079d2d68e9b10e9055642f';
        let map;
        let markers = [];
        let libraries = [];
        let selectedLibrary = null;

        // Map initialization
        function initMap() {
            map = L.map('map').setView([35.6762, 139.6503], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
        }

        // Show status message
        function showStatus(message, isError = false) {
            const el = document.getElementById('statusMessage');
            el.innerHTML = `<div class="${isError ? 'error' : 'loading'}">
                ${isError ? '❌' : '<span class="spinner"></span>'}
                ${message}
            </div>`;
        }

        // Search libraries near current location
        async function searchLibraries() {
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;

            try {
                showStatus('現在地を取得中...');

                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });

                const { latitude, longitude } = position.coords;
                showStatus('図書館情報を取得中...');

                // Get libraries near the location
                const response = await fetch(
                    `https://api.calil.jp/library?` +
                    `appkey=${API_KEY}&` +
                    `geocode=${longitude},${latitude}&` +
                    `limit=50&` +
                    `format=json`
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                libraries = data.libraries || [];

                if (libraries.length === 0) {
                    showStatus('近くの図書館が見つかりませんでした', true);
                    btn.disabled = false;
                    return;
                }

                // Clear previous markers
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];

                // Update map center and add markers
                map.setView([latitude, longitude], 13);

                // Add user location marker
                L.circleMarker([latitude, longitude], {
                    radius: 8,
                    fillColor: '#667eea',
                    color: '#fff',
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup('現在地');

                // Add library markers
                libraries.forEach((lib, idx) => {
                    const marker = L.marker([lib.latitude, lib.longitude], {
                        title: lib.formal_name
                    }).addTo(map);

                    marker.on('click', () => selectLibrary(idx));
                    markers.push(marker);
                });

                // Display library list
                displayLibraries();

                document.getElementById('statusMessage').innerHTML =
                    `<div class="stats">✓ ${libraries.length}件の図書館を見つけました</div>`;

            } catch (error) {
                showStatus(`エラー: ${error.message}`, true);
            } finally {
                btn.disabled = false;
            }
        }

        // Display library list
        function displayLibraries() {
            const listEl = document.getElementById('libraryList');
            listEl.innerHTML = libraries.map((lib, idx) => `
                <div class="library-item ${selectedLibrary === idx ? 'active' : ''}"
                     onclick="selectLibrary(${idx})">
                    <div class="library-name">${lib.formal_name}</div>
                    <div class="library-info">
                        ${lib.address ? `<span>📍 ${lib.address}</span>` : ''}
                        ${lib.tel ? `<span>☎️ ${lib.tel}</span>` : ''}
                        ${lib.systemname ? `<span>🏛️ ${lib.systemname}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Select library and show on map
        function selectLibrary(idx) {
            selectedLibrary = idx;
            const lib = libraries[idx];

            // Update UI
            displayLibraries();

            // Center map on selected library
            map.setView([lib.latitude, lib.longitude], 15);
            markers[idx].openPopup();
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initMap();
            showStatus('現在地から検索ボタンをクリックしてください');
        });
    </script>
</body>
</html>
